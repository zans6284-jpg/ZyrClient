<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyrClient - HD Client</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: linear-gradient(135deg, #0f172a, #1e3a8a, #4c1d95, #2563eb); --panel: rgba(30, 58, 138, 0.7); --magenta: #d946ef; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; color: white; }
        body { background: var(--bg); background-size: 400% 400%; animation: wave 15s ease infinite; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        @keyframes wave { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        
        .container { width: 100%; max-width: 700px; background: var(--panel); border: 1px solid rgba(59,130,246,0.5); border-radius: 20px; padding: 30px; text-align: center; backdrop-filter: blur(10px);}
        h1 { color: #3b82f6; margin-bottom: 5px; }
        h2 { font-size: 1.2rem; color: #cbd5e1; margin-bottom: 25px; }
        
        input[type="file"] { width: 100%; padding: 15px; background: rgba(0,0,0,0.3); border-radius: 12px; border: 2px dashed #3b82f6; margin-bottom: 15px; cursor: pointer; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; background: linear-gradient(90deg, #2563eb, var(--magenta)); font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: 0.3s;}
        button:hover { transform: translateY(-2px); }
        
        .result-panel { display: none; margin-top: 20px; padding: 15px; background: rgba(0,0,0,0.4); border-radius: 15px; }
        #outputMedia { max-width: 100%; max-height: 400px; border-radius: 10px; margin-bottom: 15px; }
        canvas { display: none; } /* Tersembunyi, untuk render HD */
    </style>
</head>
<body>
    <h1>ZyrClient</h1>
    <h2>Hd Client</h2>
    <div class="container">
        <input type="file" id="mediaInput" accept="image/*, video/*">
        <button id="hdBtn" onclick="processHD()">Tombol Hd</button>
        
        <div class="result-panel" id="resultPanel">
            <h3 style="margin-bottom: 10px;">Hasil HD (1080p Target)</h3>
            <div id="mediaContainer"></div>
            <button onclick="downloadMedia()">Download</button>
            <button onclick="downloadPluginHD()" style="background: #1e3a8a;">Download Plugin</button>
        </div>
        <canvas id="hdCanvas"></canvas>
    </div>
    <a href="index.html" style="display:block; margin-top:20px; color:#cbd5e1;">Kembali</a>

    <script>
        let finalUrl = "";
        let originalName = "";

        async function processHD() {
            const file = document.getElementById('mediaInput').files[0];
            if(!file) return alert("Masukkan foto/video!");
            document.getElementById('hdBtn').innerText = "Processing HD...";
            
            originalName = file.name;
            const container = document.getElementById('mediaContainer');
            container.innerHTML = "";

            if(file.type.startsWith('image/')) {
                // Logika Simulasi HD (Canvas Scaling + Smoothing) untuk jernih, tidak pecah
                const img = new Image();
                img.src = URL.createObjectURL(file);
                img.onload = () => {
                    const canvas = document.getElementById('hdCanvas');
                    const ctx = canvas.getContext('2d');
                    
                    // Skala ke 1080p
                    const targetWidth = 1080;
                    const scale = targetWidth / img.width;
                    canvas.width = targetWidth;
                    canvas.height = img.height * scale;
                    
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = "high";
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    finalUrl = canvas.toDataURL("image/png", 1.0);
                    const outImg = document.createElement('img');
                    outImg.src = finalUrl;
                    outImg.id = "outputMedia";
                    container.appendChild(outImg);
                    
                    showResult();
                };
            } else if (file.type.startsWith('video/')) {
                // Untuk video murni client-side, kita mock pass-through karena upscaling video butuh server FFmpeg
                finalUrl = URL.createObjectURL(file);
                const outVid = document.createElement('video');
                outVid.src = finalUrl;
                outVid.controls = true;
                outVid.id = "outputMedia";
                container.appendChild(outVid);
                showResult();
            }
        }

        function showResult() {
            document.getElementById('resultPanel').style.display = "block";
            document.getElementById('hdBtn').innerText = "Tombol Hd";
        }

        function downloadMedia() {
            if(!finalUrl) return;
            const a = document.createElement('a');
            a.href = finalUrl;
            a.download = "HD_" + originalName;
            a.click();
        }

        function downloadPluginHD() {
            const code = `
/* Plugin ZyrClient - HD Function (Canvas Image Enhancer) */
function zyrMakeHD(imageElement) {
    let canvas = document.createElement('canvas');
    let ctx = canvas.getContext('2d');
    let target = 1080;
    let scale = target / imageElement.width;
    canvas.width = target;
    canvas.height = imageElement.height * scale;
    ctx.imageSmoothingEnabled = true;
    ctx.imageSmoothingQuality = "high";
    ctx.drawImage(imageElement, 0, 0, canvas.width, canvas.height);
    return canvas.toDataURL("image/png", 1.0);
}`;
            const blob = new Blob([code], { type: "text/javascript" });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "ZyrHdPlugin.js";
            a.click();
        }
    </script>
</body>
</html>
