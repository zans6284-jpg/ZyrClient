<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyrClient - Up Quality</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: #000; color: #fff; min-height: 100vh; padding: 30px 15px; display: flex; flex-direction: column; align-items: center; }
        .title-main { font-size: 2.2rem; font-weight: 700; background: linear-gradient(45deg, #ff007f, #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        .app-card { width: 100%; max-width: 480px; background: linear-gradient(135deg, rgba(255, 0, 127, 0.1), rgba(123, 44, 191, 0.2)); border: 1px solid rgba(0, 242, 254, 0.2); border-radius: 20px; padding: 25px; backdrop-filter: blur(10px); }
        .upload-zone { width: 100%; padding: 35px 15px; background: rgba(0,0,0,0.5); border: 2px dashed rgba(0, 242, 254, 0.4); border-radius: 12px; text-align: center; cursor: pointer; margin-bottom: 20px; }
        .upload-zone input { display: none; }
        .btn-proc { width: 100%; padding: 14px; background: linear-gradient(90deg, #ff007f, #7b2cbf); border: none; border-radius: 30px; color: #fff; font-weight: 600; cursor: pointer; margin-bottom: 20px; }
        .output-panel { display: none; width: 100%; text-align: center; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px; border: 1px solid rgba(0,255,128,0.3); }
        .img-res { width: 100%; max-height: 260px; object-fit: contain; border-radius: 8px; margin-bottom: 15px; }
        .btn-download { display: block; width: 100%; padding: 12px; background: #00ff80; color: #000; font-weight: 600; border-radius: 30px; text-decoration: none; text-align: center; }
    </style>
</head>
<body>
    <h1 class="title-main">ZyrClient</h1>
    <div class="app-card">
        <div class="upload-zone" onclick="document.getElementById('fileIn').click()">
            <i class="fas fa-file-image" style="font-size: 2.5rem; color: #00f2fe; margin-bottom: 10px;"></i>
            <p id="labelIn">Masukkan file foto atau video</p>
            <input type="file" id="fileIn" accept="image/*" onchange="handleFile()">
        </div>
        <button class="btn-proc" onclick="executeUp()">Up</button>

        <div class="output-panel" id="outBox">
            <p style="font-size: 0.85rem; color: #00ff80; margin-bottom: 12px;"><i class="fas fa-circle-check"></i> Hasil Penghdan 1K</p>
            <img class="img-res" id="imgTarget" src="">
            <a href="#" class="btn-download" id="dlLink" download="ZyrClient_1K.png">Download</a>
        </div>
    </div>

    <script>
        let rawData = null;
        function handleFile() {
            const f = document.getElementById('fileIn').files[0];
            if(f) {
                document.getElementById('labelIn').innerText = f.name;
                const r = new FileReader();
                r.onload = (e) => { rawData = e.target.result; };
                r.readAsDataURL(f);
            }
        }
        function executeUp() {
            if(!rawData) return alert('Pilih berkas media!');
            const b = document.querySelector('.btn-proc');
            b.innerText = 'Memetakan Ulang Resolusi 1K...';
            
            setTimeout(() => {
                const img = new Image();
                img.src = rawData;
                img.onload = () => {
                    const cvs = document.createElement('canvas');
                    const ctx = cvs.getContext('2d');
                    cvs.width = 1920; cvs.height = 1080;
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, 0, 0, 1920, 1080);
                    
                    const out = cvs.toDataURL('image/png');
                    document.getElementById('imgTarget').src = out;
                    document.getElementById('dlLink').href = out;
                    document.getElementById('outBox').style.display = 'block';
                    b.innerText = 'Up';
                };
            }, 1200);
        }
    </script>
</body>
</html>
