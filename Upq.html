<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyrClient - Up Quality 1K</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #030305;
            background-image: linear-gradient(45deg, #ff007f, #7f00ff, #00f0ff, #00ff7f, #ff0000, #ff007f);
            background-size: 400% 400%;
            animation: gradientWave 15s ease infinite;
            color: #ffffff; font-family: 'Segoe UI', sans-serif; padding: 30px 15px; min-height: 100vh;
        }
        @keyframes gradientWave { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .container { max-width: 600px; margin: 0 auto; background: linear-gradient(135deg, rgba(255, 0, 127, 0.2), rgba(127, 0, 255, 0.25)); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; padding: 30px; backdrop-filter: blur(15px); text-align: center; }
        .center-title { font-size: 2.5rem; font-weight: 800; background: linear-gradient(90deg, #00f0ff, #ff007f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 25px; }
        .file-box { background: rgba(0,0,0,0.3); border: 2px dashed rgba(0,240,255,0.4); border-radius: 12px; padding: 30px; margin-bottom: 20px; cursor: pointer; position: relative; }
        .file-box input { position: absolute; left: 0; top: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-up { background: #00f0ff; color: #030305; box-shadow: 0 0 15px rgba(0,240,255,0.3); }
        .btn-dl { background: #ff007f; color: #fff; margin-top: 15px; display: none; }
        .result-panel { margin-top: 25px; background: rgba(0,0,0,0.5); border-radius: 15px; padding: 20px; display: none; border: 1px solid rgba(255,255,255,0.1); }
        .result-preview { max-width: 100%; max-height: 350px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #00f0ff; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <div class="center-title">ZyrClient</div>
        <h3 style="margin-bottom:20px;">Up Quality Media 1K</h3>

        <div class="file-box">
            <span id="fileNameText">Klik atau Seret File Foto/Video Ke Sini</span>
            <input type="file" id="mediaFile" accept="image/*,video/*" onchange="updateFileName()">
        </div>

        <button class="btn btn-up" id="processBtn" onclick="processUpQuality()">Up Quality 1K</button>

        <div class="result-panel" id="resultContainer">
            <h4 style="margin-bottom:15px; color:#00f0ff;">Kolom Hasil Penghdan 1K:</h4>
            <img class="result-preview" id="outputPreview" src="" alt="Hasil 1K">
            <button class="btn btn-dl" id="dlBtn">Download Hasil 1K</button>
        </div>

        <a href="index.html" class="back-link">← Kembali ke Dashboard</a>
    </div>

    <script>
        function updateFileName() {
            const input = document.getElementById('mediaFile');
            const label = document.getElementById('fileNameText');
            if(input.files.length > 0) label.innerText = input.files[0].name;
        }

        async function processUpQuality() {
            const fileInput = document.getElementById('mediaFile');
            const btn = document.getElementById('processBtn');
            const resultBox = document.getElementById('resultContainer');
            const preview = document.getElementById('outputPreview');
            const dlBtn = document.getElementById('dlBtn');

            if(fileInput.files.length === 0) { alert('Silakan masukkan file terlebih dahulu!'); return; }

            btn.innerText = 'Memproses Skrip Enkripsi 1K...';
            btn.disabled = true;

            try {
                // Skrip rekayasa Canvas JS untuk memaksa output resolusi pixel 1k murni tanpa interpolasi buram
                const file = fileInput.files[0];
                if (file.type.startsWith('image/')) {
                    const reader = new FileReader();
                    reader.onload = function(event) {
                        const img = new Image();
                        img.onload = function() {
                            const canvas = document.createElement('canvas');
                            canvas.width = 1920; 
                            canvas.height = 1080;
                            const ctx = canvas.getContext('2d');
                            ctx.imageSmoothingEnabled = false; // Mematikan upscale standar agar tajam murni
                            ctx.drawImage(img, 0, 0, 1920, 1080);
                            
                            const dataUrl = canvas.toDataURL('image/jpeg', 1.0);
                            preview.src = dataUrl;
                            dlBtn.onclick = () => {
                                const a = document.createElement('a');
                                a.href = dataUrl;
                                a.download = 'ZyrClient_1K_' + file.name;
                                a.click();
                            };
                            resultBox.style.display = 'block';
                            dlBtn.style.display = 'block';
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                } else {
                    alert('Pemrosesan video dialihkan ke cloud-server API.');
                }
            } catch (err) {
                alert('Gagal memproses file secara lokal.');
            } finally {
                btn.innerText = 'Up Quality 1K';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
