<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyrClient - Up Quality</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: #000; color: #fff; min-height: 100vh; padding: 30px 15px; display: flex; flex-direction: column; align-items: center; }
        .title-center { font-size: 2.2rem; font-weight: 700; background: linear-gradient(45deg, #ff007f, #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 30px; }
        .app-box { width: 100%; max-width: 500px; background: linear-gradient(135deg, rgba(255, 0, 127, 0.1), rgba(123, 44, 191, 0.25)); border: 1px solid rgba(0, 242, 254, 0.2); border-radius: 20px; padding: 25px; backdrop-filter: blur(10px); }
        .file-zone { width: 100%; padding: 30px 20px; background: rgba(0,0,0,0.5); border: 2px dashed rgba(0, 242, 254, 0.4); border-radius: 12px; text-align: center; cursor: pointer; margin-bottom: 20px; }
        .file-zone input { display: none; }
        .btn-action { width: 100%; padding: 14px; background: linear-gradient(90deg, #ff007f, #7b2cbf); border: none; border-radius: 30px; color: #fff; font-weight: 600; cursor: pointer; margin-bottom: 25px; }
        .output-box { display: none; width: 100%; text-align: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid rgba(0,242,254,0.2); }
        .output-img { width: 100%; max-height: 300px; object-fit: contain; border-radius: 8px; margin-bottom: 15px; }
        .btn-dl { display: inline-block; width: 100%; padding: 12px; background: #00f2fe; color: #000; font-weight: 600; border-radius: 30px; text-decoration: none; }
    </style>
</head>
<body>
    <h1 class="title-center">ZyrClient</h1>
    <div class="app-box">
        <div class="file-zone" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-cloud-upload-alt" style="font-size: 2.5rem; color: #00f2fe; margin-bottom: 10px;"></i>
            <p id="uploadTxt">Pilih atau letakkan File Foto / Video</p>
            <input type="file" id="fileInput" accept="image/*" onchange="previewFile()">
        </div>
        <button class="btn-action" onclick="processQuality()">Up Quality to 1K</button>

        <div class="output-box" id="outBox">
            <p style="font-size: 0.9rem; color: #00ff80; margin-bottom: 10px;"><i class="fas fa-circle-check"></i> Hasil Penghdan 1K Terwujud</p>
            <img class="output-img" id="outImg" src="">
            <a href="#" class="btn-dl" id="dlBtn" download="ZyrClient_1K.png">Download Hasil</a>
        </div>
    </div>

    <script>
        let fileData = null;
        function previewFile() {
            const file = document.getElementById('fileInput').files[0];
            if(file) {
                document.getElementById('uploadTxt').innerText = file.name;
                const reader = new FileReader();
                reader.onload = function(e) { fileData = e.target.result; }
                reader.readAsDataURL(file);
            }
        }
        function processQuality() {
            if(!fileData) return alert('Pilih file terlebih dahulu!');
            const btn = document.querySelector('.btn-action');
            btn.innerText = 'Memproses Matrix Resampling Gambar...';
            
            setTimeout(() => {
                const img = new Image();
                img.src = fileData;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = 1920; 
                    canvas.height = 1080;
                    ctx.imageSmoothingEnabled = true;
                    ctx.imageSmoothingQuality = 'high';
                    ctx.drawImage(img, 0, 0, 1920, 1080);
                    
                    const result = canvas.toDataURL('image/png');
                    document.getElementById('outImg').src = result;
                    document.getElementById('dlBtn').href = result;
                    document.getElementById('outBox').style.display = 'block';
                    btn.innerText = 'Up Quality to 1K';
                }
            }, 1500);
        }
    </script>
</body>
</html>
