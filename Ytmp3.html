<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YT MP3 Converter - ZyrClient</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-dark: #070a12; --ui-blue: #1e293b; --ui-blue-dark: #0f172a; --accent-red: #ff0000; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: #fff; padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; background: linear-gradient(135deg, var(--ui-blue), var(--ui-blue-dark)); border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .back-btn { display: inline-block; color: var(--accent-red); text-decoration: none; margin-bottom: 20px; }
        h1 { text-align: center; font-size: 2.2rem; }
        .yt-brand { text-align: center; color: var(--accent-red); margin-bottom: 25px; font-size: 1.2rem; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .input-group input { width: 100%; padding: 15px; background: #0b0f19; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; outline: none; margin-bottom: 20px; }
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 1rem; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-take { background: var(--accent-red); color: #fff; }
        
        .ytinfo { display: none; margin-top: 30px; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 15px; border: 1px dashed var(--accent-red); }
        .frame-wrapper { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 10px; margin-bottom: 15px; }
        .frame-wrapper iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .meta-box { background: #0b0f19; padding: 15px; border-radius: 8px; margin-bottom: 20px; font-size: 0.95rem; line-height: 1.4; }
        
        .dl-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-video { background: #3b82f6; color: #fff; }
        .btn-audio { background: #eab308; color: #000; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Kembali</a>
        <h1>ZyrClient</h1>
        <div class="yt-brand"><i class="fa-brands fa-youtube"></i> YT MP3 & MP4 Converter</div>

        <div class="input-group">
            <input type="text" id="ytUrl" placeholder="Tempel Tautan / URL Video YouTube di sini...">
        </div>

        <button class="btn btn-take" onclick="parseYoutube()"><i class="fa-solid fa-wand-magic-sparkles"></i> Take</button>

        <div class="ytinfo" id="ytInfoBox">
            <div class="frame-wrapper">
                <iframe id="ytPlayer" src="" allowfullscreen></iframe>
            </div>
            
            <div class="meta-box">
                <p><strong>Target URL:</strong> <span id="outYtUrl" style="color:#00d2ff;">-</span></p>
                <p style="margin-top: 5px;"><strong>Status Engine:</strong> <span style="color:#22c55e;">Ready to Stream & Convert</span></p>
            </div>

            <div class="dl-actions">
                <button class="btn btn-video" id="dlVideo"><i class="fa-solid fa-file-video"></i> Download Video Yt</button>
                <button class="btn btn-audio" id="dlAudio"><i class="fa-solid fa-file-audio"></i> Mp3</button>
            </div>
        </div>
    </div>

    <script>
        function extractVideoID(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function parseYoutube() {
            const url = document.getElementById('ytUrl').value;
            const videoId = extractVideoID(url);
            
            if(!videoId) return alert('Silakan masukkan url YouTube yang valid!');
            
            document.getElementById('ytPlayer').src = `https://www.youtube.com/embed/${videoId}`;
            document.getElementById('outYtUrl').innerText = url;
            
            // Integrasi Eksternal Gateway Downloader
            document.getElementById('dlVideo').onclick = () => {
                window.open(`https://9xbuddy.org/process?url=${encodeURIComponent(url)}`, '_blank');
            };
            document.getElementById('dlAudio').onclick = () => {
                window.open(`https://id.savefrom.net/`, '_blank');
            };
            
            document.getElementById('ytInfoBox').style.display = 'block';
            alert('Data YouTube berhasil dimuat ke dalam server hub!');
        }
    </script>
</body>
</html>
