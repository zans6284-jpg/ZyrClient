<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remove Background - ZyrClient</title>
    <style>
        body { 
            background: linear-gradient(135deg, #121212, #1e1e1e); 
            color: white; 
            font-family: sans-serif; 
            text-align: center; 
            padding: 20px; 
            margin: 0;
            min-height: 100vh;
        }
        h1 { color: #00d2ff; text-shadow: 0 0 10px #00d2ff; }
        .container { 
            background: #2a2a2a; 
            border-radius: 15px; 
            padding: 25px; 
            max-width: 400px; 
            margin: 20px auto; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); 
        }
        .icon-title { font-size: 40px; margin-bottom: 5px; }
        .input-file { 
            margin: 20px 0; 
            padding: 10px; 
            background: #1e1e1e; 
            border: 1px solid #00d2ff; 
            border-radius: 8px; 
            width: 100%; 
            box-sizing: border-box; 
            color: white;
        }
        .btn-remove { 
            background: #00d2ff; 
            color: #000; 
            border: none; 
            padding: 15px; 
            border-radius: 10px; 
            font-size: 16px; 
            font-weight: bold; 
            width: 100%; 
            cursor: pointer; 
            transition: 0.3s;
        }
        .btn-remove:hover { background: #0098b8; }
        .result-box { 
            margin-top: 25px; 
            min-height: 250px; 
            background: repeating-conic-gradient(#808080 0% 25%, transparent 0% 50%) 50% / 20px 20px;
            background-color: #333;
            border-radius: 10px; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            border: 2px dashed #00d2ff;
            overflow: hidden;
            position: relative;
        }
        .result-box img { max-width: 100%; max-height: 100%; display: none; }
        .result-text { background: rgba(0,0,0,0.7); padding: 5px 10px; border-radius: 5px; }
        .back-btn { background: transparent; color: white; border: 1px solid white; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div class="icon-title">🪄 🖼️</div>
    <h1>ZyrClient</h1>
    <h2>Remove Background</h2>

    <div class="container">
        <input type="file" class="input-file" id="imageInput" accept="image/*">
        
        <button class="btn-remove" id="processBtn" onclick="processRemoveBackground()">Remove Background</button>
        
        <h3 style="margin-top: 30px; text-align: left;">Result:</h3>
        <div class="result-box" id="resultContainer">
            <span class="result-text" id="statusText">Pilih foto lalu klik tombol di atas</span>
            <img id="resultImage" src="" alt="Hasil Hapus Background">
        </div>
    </div>

    <button class="back-btn" onclick="window.location.href='index.html'">← Kembali</button>

    <script>
        function processRemoveBackground() {
            const fileInput = document.getElementById('imageInput');
            const statusText = document.getElementById('statusText');
            const resultImage = document.getElementById('resultImage');
            const btn = document.getElementById('processBtn');

            if (!fileInput.files[0]) {
                alert("Harap masukkan file foto terlebih dahulu!");
                return;
            }

            // Ubah tampilan menjadi sedang memproses
            btn.innerText = "Memproses (Mohon Tunggu)...";
            btn.disabled = true;
            statusText.innerText = "Sedang menganalisa gambar...";
            resultImage.style.display = "none";

            // --- TEMPAT MENGHUBUNGKAN KE BACKEND TERMUX ---
            // Nanti, kamu akan menggunakan fungsi fetch() di sini untuk mengirim file 
            // ke server.js kamu (misalnya: fetch('https://[LINK-CLOUDFLARE]/api/removebg'))
            
            // Karena backend remove bg-nya belum ada, ini adalah simulasi prosesnya:
            setTimeout(() => {
                statusText.style.display = "none";
                // URL gambar transparan bohongan sebagai contoh hasil
                resultImage.src = "https://www.pngarts.com/files/1/Magic-Wand-PNG-Background-Image.png"; 
                resultImage.style.display = "block";
                
                btn.innerText = "Remove Background";
                btn.disabled = false;
                alert("Simulasi UI selesai! Nantinya, sambungkan kerangka script ini ke API Remove.bg di backend kamu agar berfungsi sungguhan.");
            }, 2500); // Simulasi loading 2,5 detik
        }
    </script>
</body>
</html>
