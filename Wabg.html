<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyrClient - WhatsApp Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%);
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-slate-900/80 border border-slate-700/50 rounded-2xl shadow-2xl p-6 w-full max-w-md backdrop-blur-md">
        
        <h1 class="text-3xl font-bold text-center text-blue-400 mb-6 tracking-wide">ZyrClient</h1>
        
        <div class="w-full h-44 rounded-xl overflow-hidden mb-6 border border-slate-700 shadow-inner">
            <img src="https://images.uncyc.org/indonesia/thumb/5/52/Shadow_Sama.jpg/300px-Shadow_Sama.jpg" alt="ZyrClient Banner" class="w-full h-full object-cover">
        </div>

        <div class="mb-5">
            <label class="block text-sm font-semibold text-slate-300 mb-2">Nomor WhatsApp Global:</label>
            <input type="number" id="waNumber" placeholder="Contoh: 6285194814013" 
                   class="w-full px-4 py-3 bg-slate-800 border border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white font-medium placeholder-slate-500">
        </div>

        <button id="btnLogin" onclick="requestPairingCode()" 
                class="w-full py-3 bg-emerald-500 hover:bg-emerald-600 active:bg-emerald-700 text-white font-bold rounded-lg transition-all shadow-lg shadow-emerald-500/20 mb-6">
            Login & Dapatkan Pairing Code
        </button>

        <div class="mb-5">
            <label class="block text-sm font-semibold text-slate-300 mb-2">Pairing Code Kamu:</label>
            <div id="pairingCodeDisplay" class="w-full py-4 bg-slate-800/80 border-2 border-dashed border-amber-500 rounded-lg text-center text-3xl font-extrabold tracking-widest text-amber-400 shadow-inner">
                - - - - - - - -
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-semibold text-slate-300 mb-2">Status Koneksi:</label>
            <div id="statusDisplay" class="w-full p-3 bg-black/50 border border-slate-800 rounded-lg font-mono text-xs text-center uppercase tracking-wider text-slate-400">
                Menunggu Perintah...
            </div>
        </div>

        <hr class="border-slate-700/50 my-6">

        <div class="mb-4">
            <label class="block text-sm font-semibold text-slate-300 mb-2">Pilih File Foto / Video:</label>
            <input type="file" id="storyFile" accept="image/*,video/*" 
                   class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer">
        </div>

        <button id="btnUpload" onclick="uploadToStory()" 
                class="w-full py-2.5 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-semibold rounded-lg transition-all shadow-md">
            Upload ke Story WA
        </button>

    </div>

    <script>
        // ⚠️ MASUKKAN LINK TUNNEL PINGGY KAMU YANG SEDANG AKTIF DI SINI (Jangan beri tanda '/' di ujungnya!)
        const BACKEND_URL = "https://llhmd-140-213-158-138.run.pinggy-free.link"; 

        async function requestPairingCode() {
            const number = document.getElementById('waNumber').value.trim();
            const btn = document.getElementById('btnLogin');
            const codeBox = document.getElementById('pairingCodeDisplay');
            const statusBox = document.getElementById('statusDisplay');
            
            if(!number) return alert("Masukkan nomor WhatsApp terlebih dahulu!");
            if(number.includes('+')) return alert("Gunakan format angka langsung saja (contoh: 6285xxx) tanpa tanda '+' !");

            // Animasi Loading UI
            btn.innerText = "Memproses...";
            btn.disabled = true;
            codeBox.innerText = "LOADING...";
            statusBox.innerText = "MENGHUBUNGI BACKEND...";
            statusBox.style.color = "#fbbf24";

            try {
                // Rute endpoint yang tepat sasaran agar tidak memicu error 404 lagi
                const targetUrl = `${BACKEND_URL}/api/connect?number=${number}`;
                console.log("Mengirim request ke URL:", targetUrl);

                const response = await fetch(targetUrl, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json',
                        'x-pinggy-no-interstitial': 'true' // Bypass halaman warning Pinggy
                    }
                });
                
                // Menangkap kegagalan rute (seperti 404 Not Found)
                if (!response.ok) {
                    throw new Error(`Server Merespon ${response.status}. Pastikan server.js berjalan di port 8080!`);
                }
                
                const data = await response.json();

                if(data.status === "pairing") {
                    codeBox.innerText = data.code;
                    statusBox.innerText = "KODE BERHASIL DIDAPAT! CEK NOTIFIKASI WA KAMU";
                    statusBox.style.color = "#fbbf24";
                } else if(data.status === "connected") {
                    codeBox.innerText = "CONNECTED";
                    statusBox.innerText = "SUKSES: LOGGED IN (Sudah Terhubung)";
                    statusBox.style.color = "#25D366";
                } else {
                    throw new Error(data.message || "Gagal mendapatkan respon valid.");
                }
            } catch (error) {
                codeBox.innerText = "ERROR";
                statusBox.innerText = "GAGAL: " + error.message;
                statusBox.style.color = "#ef4444";
                console.error("Detail Error:", error);
            } finally {
                btn.innerText = "Login & Dapatkan Pairing Code";
                btn.disabled = false;
            }
        }

        async function uploadToStory() {
            const fileInput = document.getElementById('storyFile');
            const file = fileInput.files[0];
            const btn = document.getElementById('btnUpload');

            if(!file) return alert("Pilih file foto atau video terlebih dahulu!");

            btn.innerText = "Mengupload...";
            btn.disabled = true;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64Data = reader.result;
                const fileType = file.type.startsWith('image/') ? 'image' : 'video';

                try {
                    const response = await fetch(`${BACKEND_URL}/api/upload-story`, {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'Accept': 'application/json',
                            'x-pinggy-no-interstitial': 'true'
                        },
                        body: JSON.stringify({
                            media: base64Data,
                            type: fileType
                        })
                    });
                    
                    if (!response.ok) {
                        throw new Error(`HTTP Error ${response.status}`);
                    }

                    const resData = await response.json();

                    if(resData.status === "success") {
                        alert("Berhasil! File telah terposting ke Story WhatsApp kamu.");
                    } else {
                        alert("Gagal upload: " + (resData.message || "Ditolak server."));
                    }
                } catch (error) {
                    alert("Gagal menghubungi server backend: " + error.message);
                } finally {
                    btn.innerText = "Upload ke Story WA";
                    btn.disabled = false;
                }
            };
        }
    </script>
</body>
</html>
