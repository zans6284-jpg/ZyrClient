<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyrClient - GitHub Only Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background: linear-gradient(135deg, #111827 0%, #030712 100%);
        }
    </style>
</head>
<body class="text-white min-h-screen flex flex-col items-center justify-center p-4">

    <div class="bg-slate-900/90 border border-slate-800 rounded-2xl shadow-2xl p-6 w-full max-w-md">
        
        <h1 class="text-3xl font-bold text-center text-blue-500 mb-6 tracking-wide">ZyrClient Cloud</h1>
        
        <div class="w-full h-44 rounded-xl overflow-hidden mb-6 border border-slate-800 shadow-inner">
            <img src="https://images.uncyc.org/indonesia/thumb/5/52/Shadow_Sama.jpg/300px-Shadow_Sama.jpg" alt="ZyrClient Banner" class="w-full h-full object-cover">
        </div>

        <div class="mb-4">
            <label class="block text-sm font-semibold text-slate-400 mb-1">WhatsApp Instance ID:</label>
            <input type="text" id="instanceId" placeholder="Masukkan ID Instance Anda" 
                   class="w-full px-4 py-2.5 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white font-mono text-sm">
        </div>

        <div class="mb-4">
            <label class="block text-sm font-semibold text-slate-400 mb-1">API Token / Key:</label>
            <input type="password" id="apiToken" placeholder="Masukkan Token API" 
                   class="w-full px-4 py-2.5 bg-slate-800 border border-slate-700 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white font-mono text-sm">
        </div>

        <hr class="border-slate-800 my-4">

        <div class="mb-5">
            <label class="block text-sm font-semibold text-slate-300 mb-2">Nomor WhatsApp (Gunakan Kode Negara):</label>
            <input type="number" id="waNumber" placeholder="Contoh: 6285194814013" 
                   class="w-full px-4 py-3 bg-slate-800 border border-slate-600 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-white font-medium">
        </div>

        <button id="btnLogin" onclick="requestPairingCode()" 
                class="w-full py-3 bg-blue-600 hover:bg-blue-700 active:bg-blue-800 text-white font-bold rounded-lg transition-all shadow-lg shadow-blue-600/20 mb-6">
            Minta Pairing Code via API Cloud
        </button>

        <div class="mb-5">
            <label class="block text-sm font-semibold text-slate-300 mb-2">Pairing Code Kamu:</label>
            <div id="pairingCodeDisplay" class="w-full py-4 bg-slate-800/50 border-2 border-dashed border-blue-500 rounded-lg text-center text-3xl font-extrabold tracking-widest text-blue-400">
                - - - - - - - -
            </div>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-semibold text-slate-300 mb-2">Status Server:</label>
            <div id="statusDisplay" class="w-full p-3 bg-black/40 border border-slate-800 rounded-lg font-mono text-xs text-center uppercase tracking-wider text-slate-500">
                Murni GitHub Pages (Tanpa Backend Lokal)
            </div>
        </div>

        <hr class="border-slate-800 my-6">

        <div class="mb-4">
            <label class="block text-sm font-semibold text-slate-300 mb-2">Pilih File Foto / Video:</label>
            <input type="file" id="storyFile" accept="image/*,video/*" 
                   class="w-full text-sm text-slate-400 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-slate-800 file:text-slate-300 hover:file:bg-slate-700 cursor-pointer">
        </div>

        <button id="btnUpload" onclick="uploadToStory()" 
                class="w-full py-2.5 bg-emerald-600 hover:bg-emerald-700 active:bg-emerald-800 text-white font-semibold rounded-lg transition-all shadow-md">
            Kirim ke Story WA
        </button>

    </div>

    <script>
        async function requestPairingCode() {
            const number = document.getElementById('waNumber').value.trim();
            const idInstance = document.getElementById('instanceId').value.trim();
            const token = document.getElementById('apiToken').value.trim();
            
            const btn = document.getElementById('btnLogin');
            const codeBox = document.getElementById('pairingCodeDisplay');
            const statusBox = document.getElementById('statusDisplay');
            
            if(!number || !idInstance || !token) {
                return alert("Mohon isi ID Instance, Token, dan Nomor WhatsApp!");
            }

            btn.innerText = "Connecting API...";
            btn.disabled = true;
            codeBox.innerText = "WAIT...";

            try {
                // Skema request langsung menembak API Gateway Publik (Contoh menggunakan struktur rest-api umum)
                const targetUrl = `https://api.wa-gateway-publik.com/instance${idInstance}/pairingCode?token=${token}&number=${number}`;

                const response = await fetch(targetUrl, { method: 'GET' });
                
                if (!response.ok) {
                    throw new Error(`API Error: ${response.status}`);
                }
                
                const data = await response.json();

                if(data.code) {
                    codeBox.innerText = data.code;
                    statusBox.innerText = "KODE AKREDITASI SELESAI, MASUKKAN KODE DI HP KAMU";
                    statusBox.style.color = "#3b82f6";
                } else {
                    throw new Error("Format respon API tidak mendukung pairing code langsung.");
                }
            } catch (error) {
                codeBox.innerText = "FAILED";
                statusBox.innerText = "ERROR API: " + error.message;
                statusBox.style.color = "#ef4444";
            } finally {
                btn.innerText = "Minta Pairing Code via API Cloud";
                btn.disabled = false;
            }
        }

        async function uploadToStory() {
            const fileInput = document.getElementById('storyFile');
            const file = fileInput.files[0];
            const idInstance = document.getElementById('instanceId').value.trim();
            const token = document.getElementById('apiToken').value.trim();
            const btn = document.getElementById('btnUpload');

            if(!file || !idInstance || !token) return alert("Lengkapi file dan kredensial API!");

            btn.innerText = "Mengirim...";
            btn.disabled = true;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const base64Data = reader.result.split(',')[1];

                try {
                    // Endpoint publik untuk kirim status WA
                    const response = await fetch(`https://api.wa-gateway-publik.com/instance${idInstance}/sendStory?token=${token}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            b64Data: base64Data,
                            fileMime: file.type
                        })
                    });
                    
                    if (response.ok) {
                        alert("Story Terkirim secara instan lewat jalur GitHub Cloud!");
                    } else {
                        alert("Gagal dikirim oleh API Gateway.");
                    }
                } catch (error) {
                    alert("Koneksi internet bermasalah: " + error.message);
                } finally {
                    btn.innerText = "Kirim ke Story WA";
                    btn.disabled = false;
                }
            };
        }
    </script>
</body>
</html>
