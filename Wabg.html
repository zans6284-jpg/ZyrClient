<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyrClient - WA Ebg</title>
    <style>
        :root { --bg: linear-gradient(135deg, #0f172a, #1e3a8a, #4c1d95, #2563eb); --panel: rgba(30, 58, 138, 0.7); --magenta: #d946ef; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: monospace, sans-serif; color: white; }
        body { background: var(--bg); background-size: 400% 400%; animation: wave 15s ease infinite; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        @keyframes wave { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        
        .container { width: 100%; max-width: 700px; background: var(--panel); border: 1px solid rgba(59,130,246,0.5); border-radius: 20px; padding: 30px; text-align: center; backdrop-filter: blur(10px);}
        h1 { color: #3b82f6; margin-bottom: 5px; font-family: sans-serif; }
        h2 { font-size: 1.2rem; color: #cbd5e1; margin-bottom: 20px; font-family: sans-serif; }
        
        .img-box { width: 100%; height: 150px; background: #000; border-radius: 12px; margin-bottom: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center;}
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        input, select { width: 100%; padding: 15px; background: rgba(0,0,0,0.4); border-radius: 12px; border: 2px solid #3b82f6; margin-bottom: 15px; font-size: 1rem; outline: none; }
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; background: linear-gradient(90deg, #25D366, #128C7E); font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-bottom: 10px; transition: 0.3s; font-family: sans-serif;}
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(37,211,102,0.4); }
        
        .monitor { background: #000; border: 1px solid #333; border-radius: 10px; padding: 15px; text-align: left; height: 150px; overflow-y: auto; color: #0f0; margin-bottom: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>
    <h1>ZyrClient</h1>
    <h2>WhatsApp Ebg</h2>
    
    <div class="container">
        <div class="img-box">
            <img src="Wbg.png" alt="Wbg Logo" onerror="this.src='https://via.placeholder.com/600x150/128C7E/FFFFFF?text=Wbg.png';">
        </div>
        
        <input type="number" id="waNumber" placeholder="Nomor Global (cth: 628123456789) tanpa '+'">
        
        <select id="timeSelect">
            <option value="1000">1. 1 dtk</option>
            <option value="5000">2. 5 dtk</option>
            <option value="10000">3. 10 dtk</option>
        </select>
        
        <button onclick="loginEbg()">Tombol Login</button>
        
        <div class="monitor" id="monitorLog">
            > Standby...
        </div>
        
        <button onclick="downloadPluginWA()" style="background: #1e3a8a;">Download Plugin</button>
    </div>
    <a href="index.html" style="display:block; margin-top:20px; color:#cbd5e1; font-family:sans-serif; text-decoration:none;">Kembali</a>

    <script>
        function logMsg(msg, color = "#0f0") {
            const m = document.getElementById('monitorLog');
            m.innerHTML += `<br><span style="color:${color}">> ${msg}</span>`;
            m.scrollTop = m.scrollHeight;
        }

        function loginEbg() {
            const no = document.getElementById('waNumber').value;
            const ms = parseInt(document.getElementById('timeSelect').value);
            
            if(!no) { logMsg("Error: Nomor kosong!", "red"); return; }
            
            document.getElementById('monitorLog').innerHTML = "> Standby...";
            logMsg(`Menghubungkan ke ${no}...`);
            logMsg(`Menunggu respons Ebg dalam ${ms/1000} detik...`);
            
            setTimeout(() => {
                logMsg(`Command Berhasil! Login terotentikasi ke ${no}.`);
                // Simulasi redirect / fungsi ebg
            }, ms);
        }

        function downloadPluginWA() {
            const code = `
/* Plugin ZyrClient - WhatsApp Ebg Func */
function zyrWaEbg(number, delayMs) {
    console.log("Connecting to " + number);
    return new Promise((resolve, reject) => {
        setTimeout(() => {
            if(number) resolve({ status: "success", target: number });
            else reject({ status: "failed" });
        }, delayMs);
    });
}`;
            const blob = new Blob([code], { type: "text/javascript" });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "ZyrWaEbgPlugin.js";
            a.click();
        }
    </script>
</body>
</html>
