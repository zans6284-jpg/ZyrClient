<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>ZyrClient Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">
    <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-full max-w-sm shadow-2xl">
        <img src="Wbg.png" class="w-full h-40 object-cover rounded-xl mb-4 border border-slate-700">
        
        <input type="number" id="waNumber" placeholder="Nomor WA (628...)" class="w-full p-3 bg-slate-800 rounded-lg mb-4 text-white border border-slate-600">
        
        <button onclick="getPairingCode()" class="w-full p-3 bg-emerald-600 rounded-lg font-bold mb-4">Dapatkan Pairing Code</button>
        
        <div id="codeDisplay" class="p-4 bg-slate-800 border-2 border-dashed border-amber-500 text-center text-2xl font-mono text-amber-400 rounded-lg mb-4">
            - - - - - - - -
        </div>
        
        <div id="status" class="text-xs text-slate-400 text-center font-mono">Status: Standby</div>
    </div>

    <script>
        // ⚠️ GANTI DENGAN LINK CLOUDFLARE KAMU
        const BACKEND = "https://bottle-humor-acids-mats.trycloudflare.com "; 

        async function getPairingCode() {
            const number = document.getElementById('waNumber').value;
            const codeDisplay = document.getElementById('codeDisplay');
            const status = document.getElementById('status');
            
            codeDisplay.innerText = "LOADING...";
            status.innerText = "Status: Menghubungkan...";

            try {
                const res = await fetch(`${BACKEND}/api/connect?number=${number}`);
                const data = await res.json();
                
                if(data.code) {
                    codeDisplay.innerText = data.code;
                    status.innerText = "Status: Berhasil Terhubung";
                } else {
                    throw new Error("Gagal");
                }
            } catch (err) {
                codeDisplay.innerText = "ERROR";
                status.innerText = "Status: Backend Tidak Terjangkau";
                alert("Pastikan kamu sudah menjalankan 'cloudflared tunnel' di Termux dan link sudah benar!");
            }
        }
    </script>
</body>
</html>
