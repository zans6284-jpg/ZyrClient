<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyrClient Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-900 border border-slate-700 rounded-2xl p-6 w-full max-w-sm shadow-2xl">
        <img src="Wbg.png" alt="ZyrClient" class="w-full h-40 object-cover rounded-xl mb-4 border border-slate-700">
        
        <h1 class="text-xl font-bold text-center mb-4 text-blue-400">ZyrClient Cloud</h1>

        <input type="number" id="waNumber" placeholder="Nomor WA (contoh: 628...)" 
               class="w-full p-3 bg-slate-800 rounded-lg mb-4 text-white border border-slate-600 focus:ring-2 focus:ring-blue-500 outline-none">
        
        <button id="btnPair" onclick="getPairingCode()" class="w-full p-3 bg-emerald-600 hover:bg-emerald-700 rounded-lg font-bold mb-4 transition-all">
            Dapatkan Pairing Code
        </button>
        
        <div id="codeDisplay" class="p-4 bg-slate-800 border-2 border-dashed border-amber-500 text-center text-2xl font-mono text-amber-400 rounded-lg mb-4">
            - - - - - - - -
        </div>
        
        <div id="status" class="text-xs text-slate-400 text-center font-mono uppercase tracking-widest">
            Status: Standby
        </div>
    </div>

    <script>
        // ⚠️ GANTI LINK INI DENGAN HASIL TUNNEL TERBARU DI TERMUX KAMU
        const BACKEND_URL = "https://pay-difficulty-gnome-retailers.trycloudflare.com"; 

        async function getPairingCode() {
            const number = document.getElementById('waNumber').value;
            const btn = document.getElementById('btnPair');
            const codeDisplay = document.getElementById('codeDisplay');
            const status = document.getElementById('status');
            
            if(!number) return alert("Masukkan nomor WA!");

            btn.disabled = true;
            btn.innerText = "Memproses...";
            codeDisplay.innerText = "LOADING...";
            status.innerText = "Status: Menghubungkan ke Backend...";

            try {
                // Fetch ke endpoint server.js di Termux kamu
                const res = await fetch(`${BACKEND_URL}/api/connect?number=${number}`);
                const data = await res.json();
                
                if(data.code) {
                    codeDisplay.innerText = data.code;
                    status.innerText = "Status: Berhasil Terhubung";
                } else {
                    throw new Error("Data tidak valid");
                }
            } catch (err) {
                codeDisplay.innerText = "ERROR";
                status.innerText = "Status: Gagal Terhubung";
                alert("Gagal Fetch! Pastikan Cloudflare Tunnel sedang aktif di Termux.");
            } finally {
                btn.disabled = false;
                btn.innerText = "Dapatkan Pairing Code";
            }
        }
    </script>
</body>
</html>
