<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyrClient - TikTok Downloader</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e3a8a, #d946ef, #2563eb);
            --primary-blue: #3b82f6;
            --dark-blue: #1d4ed8; 
            --magenta: #d946ef;
            --panel-bg: rgba(29, 78, 216, 0.4); /* Biru tua UI */
            --text-light: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientWave 12s ease infinite;
            color: var(--text-light);
            min-height: 100vh;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        @keyframes gradientWave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .title-top {
            font-size: 3rem;
            font-weight: 800;
            background: linear-gradient(to right, #60a5fa, #d946ef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
        }

        /* Frame Utama - Lebar dan Besar */
        .frame-card {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            width: 100%;
            max-width: 650px; /* Frame cukup besar untuk menampilkan semuanya */
            padding: 35px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            text-align: center;
        }

        .brand-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }

        .brand-section i {
            font-size: 2.5rem;
        }

        .brand-section h2 {
            font-size: 1.8rem;
            font-weight: 600;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-bottom: 30px;
        }

        input[type="text"] {
            width: 100%;
            padding: 18px 25px;
            border-radius: 15px;
            border: 2px solid var(--primary-blue);
            background: rgba(15, 23, 42, 0.8);
            color: white;
            font-size: 1.1rem;
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            border-color: var(--magenta);
            box-shadow: 0 0 15px rgba(217, 70, 239, 0.3);
        }

        button {
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 15px;
            background: linear-gradient(to right, var(--dark-blue), var(--primary-blue));
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover {
            background: linear-gradient(to right, var(--primary-blue), var(--magenta));
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(217, 70, 239, 0.4);
        }

        /* Panel Infotd */
        .infotd {
            display: none;
            margin-top: 20px;
            background: rgba(15, 23, 42, 0.6);
            border-radius: 15px;
            padding: 25px;
            border: 1px solid rgba(96, 165, 250, 0.3);
            text-align: left;
        }

        .video-container {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 20px;
            background: #000;
        }

        video {
            width: 100%;
            max-height: 500px;
            object-fit: contain;
        }

        .username {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--magenta);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Grid Statistik Fleksibel */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-item {
            background: rgba(29, 78, 216, 0.5);
            padding: 12px 15px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
        }

        .fa-heart { color: #ef4444; }
        .fa-comment { color: #38bdf8; }
        .fa-bookmark { color: #fbbf24; }
        .fa-share { color: #a855f7; }
        .fa-users { color: #34d399; }

        .caption-box {
            font-size: 1rem;
            line-height: 1.6;
            color: #e2e8f0;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
            border-left: 4px solid var(--magenta);
        }

        .back-btn {
            margin-top: 30px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 1rem;
            transition: color 0.3s;
        }
        .back-btn:hover { color: white; }
    </style>
</head>
<body>

    <div class="title-top">ZyrClient</div>

    <div class="frame-card">
        <div class="brand-section">
            <i class="fab fa-tiktok"></i>
            <h2>TikTok</h2>
        </div>

        <div class="input-group">
            <input type="text" id="tiktokUrl" placeholder="Tempel URL TikTok di sini...">
            <button id="downloadBtn" onclick="fetchTikTokData()">Download</button>
        </div>

        <div class="infotd" id="infoPanel">
            
            <div class="video-container">
                <video id="videoPlayer" controls autoplay name="media"></video>
            </div>
            
            <div class="username">
                <i class="fas fa-user-circle"></i> <span id="usernameVal">@username</span>
            </div>

            <div class="stats-grid">
                <div class="stat-item">
                    <i class="fas fa-heart"></i>
                    <span><strong id="likeVal">0</strong></span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-comment"></i>
                    <span><strong id="commentVal">0</strong></span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-bookmark"></i>
                    <span><strong id="favVal">0</strong></span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-share"></i>
                    <span><strong id="shareVal">0</strong></span>
                </div>
                <div class="stat-item">
                    <i class="fas fa-users"></i>
                    <span><strong id="viewVal">0</strong></span>
                </div>
            </div>

            <div class="caption-box">
                <strong>Caption:</strong><br>
                <span id="captionVal">Isi caption akan muncul di sini...</span>
            </div>
        </div>
    </div>

    <a href="index.html" class="back-btn"><i class="fas fa-arrow-left"></i> Kembali ke Menu Utama</a>

    <script>
        async function fetchTikTokData() {
            const urlInput = document.getElementById('tiktokUrl').value.trim();
            const btn = document.getElementById('downloadBtn');
            const panel = document.getElementById('infoPanel');

            if (!urlInput) {
                alert('Tolong masukkan link TikTok yang ingin diunduh.');
                return;
            }

            btn.disabled = true;
            btn.innerText = 'Mengambil Data...';

            try {
                // Endpoint gratis menggunakan TikWM API yang merespon dengan format JSON
                const apiFetch = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(urlInput)}`);
                const response = await apiFetch.json();

                if (response.code === 0 && response.data) {
                    const data = response.data;

                    // 1. Memasukkan sumber video (Tanpa Watermark)
                    document.getElementById('videoPlayer').src = data.play;

                    // 2. Mengambil data username
                    document.getElementById('usernameVal').innerText = `@${data.author.unique_id}`;

                    // 3. Mengambil statistik video (diformat dengan pemisah ribuan)
                    document.getElementById('likeVal').innerText = data.digg_count.toLocaleString('id-ID');
                    document.getElementById('commentVal').innerText = data.comment_count.toLocaleString('id-ID');
                    document.getElementById('favVal').innerText = data.collect_count.toLocaleString('id-ID'); // Collect = Favorit
                    document.getElementById('shareVal').innerText = data.share_count.toLocaleString('id-ID');
                    document.getElementById('viewVal').innerText = data.play_count.toLocaleString('id-ID');

                    // 4. Mengambil teks/caption
                    document.getElementById('captionVal').innerText = data.title || 'Tidak ada deskripsi.';

                    // Menampilkan panel infotd
                    panel.style.display = 'block';
                } else {
                    alert('Gagal mengambil data. Pastikan link video valid dan akun tidak di-private.');
                }
            } catch (err) {
                alert('Kesalahan sistem atau masalah koneksi internet.');
                console.error(err);
            } finally {
                btn.disabled = false;
                btn.innerText = 'Download';
            }
        }
    </script>
</body>
</html>
