<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyrClient - TikTok</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg: linear-gradient(135deg, #0f172a, #1e3a8a, #4c1d95, #2563eb); --panel: rgba(30, 58, 138, 0.7); --magenta: #d946ef; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: sans-serif; color: white; }
        body { background: var(--bg); background-size: 400% 400%; animation: wave 15s ease infinite; min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        @keyframes wave { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .container { width: 100%; max-width: 700px; background: var(--panel); border: 1px solid rgba(59,130,246,0.5); border-radius: 20px; padding: 30px; backdrop-filter: blur(10px); }
        h1 { text-align: center; margin-bottom: 5px; color: #3b82f6; }
        .header-logo { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 30px; font-size: 1.5rem; }
        
        input { width: 100%; padding: 15px; border-radius: 12px; border: 2px solid #3b82f6; background: rgba(0,0,0,0.3); margin-bottom: 15px; font-size: 1rem; outline: none; }
        input:focus { border-color: var(--magenta); }
        
        button { width: 100%; padding: 15px; border: none; border-radius: 12px; background: linear-gradient(90deg, #2563eb, var(--magenta)); font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-bottom: 10px; }
        button:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(217,70,239,0.4); }
        
        .infotd { display: none; margin-top: 25px; padding: 20px; background: rgba(0,0,0,0.4); border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        .video-box { width: 100%; border-radius: 10px; margin-bottom: 15px; background: #000; max-height: 400px; }
        .stats { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin: 15px 0; }
        .stat-item { background: rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; font-size: 0.9rem; }
        .caption-box { font-size: 0.9rem; color: #cbd5e1; margin-bottom: 20px; line-height: 1.5; }
        
        .nav-back { display: block; text-align: center; margin-top: 20px; color: #cbd5e1; text-decoration: none; }
    </style>
</head>
<body>
    <h1>ZyrClient</h1>
    <div class="container">
        <div class="header-logo"><i class="fab fa-tiktok"></i> TikTok Downloader</div>
        
        <input type="text" id="urlInput" placeholder="Masukkan link VT TikTok...">
        <button id="takeBtn" onclick="takeData()">Take</button>
        
        <div class="infotd" id="infotd">
            <video class="video-box" id="vidPlayer" controls></video>
            <h3 id="username" style="color: var(--magenta); margin-bottom:10px;">@username</h3>
            
            <div class="stats">
                <div class="stat-item">♥️ Like: <span id="s-like">0</span></div>
                <div class="stat-item">💬 Komentar: <span id="s-komen">0</span></div>
                <div class="stat-item">🔶 Favorit: <span id="s-fav">0</span></div>
                <div class="stat-item">↪️ Share: <span id="s-share">0</span></div>
                <div class="stat-item" style="grid-column: span 2;">👥 Views: <span id="s-views">0</span></div>
            </div>
            
            <div class="caption-box"><strong>Caption:</strong> <br><span id="captionText">-</span></div>
            
            <button onclick="downloadVid()">Download</button>
            <button onclick="downloadPluginTiktok()" style="background: #1e3a8a;">Download Plugin</button>
        </div>
    </div>
    <a href="index.html" class="nav-back">Kembali</a>

    <script>
        let currentVideoUrl = "";

        async function takeData() {
            const url = document.getElementById('urlInput').value.trim();
            if(!url) return alert("Masukkan link!");
            document.getElementById('takeBtn').innerText = "Memproses...";
            
            try {
                const res = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const json = await res.json();
                
                if(json.code === 0) {
                    const d = json.data;
                    document.getElementById('vidPlayer').src = d.play;
                    currentVideoUrl = d.play;
                    document.getElementById('username').innerText = `@${d.author.unique_id}`;
                    document.getElementById('s-like').innerText = d.digg_count.toLocaleString();
                    document.getElementById('s-komen').innerText = d.comment_count.toLocaleString();
                    document.getElementById('s-fav').innerText = d.collect_count.toLocaleString();
                    document.getElementById('s-share').innerText = d.share_count.toLocaleString();
                    document.getElementById('s-views').innerText = d.play_count.toLocaleString();
                    document.getElementById('captionText').innerText = d.title || "Tidak ada caption";
                    
                    document.getElementById('infotd').style.display = "block";
                } else {
                    alert("Gagal mengambil data dari URL.");
                }
            } catch(e) { alert("Error API"); }
            document.getElementById('takeBtn').innerText = "Take";
        }

        function downloadVid() {
            if(!currentVideoUrl) return;
            const a = document.createElement('a');
            a.href = currentVideoUrl + "&dl=1"; // Parameter force download
            a.target = "_blank";
            a.download = "ZyrClient_Tiktok.mp4";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }

        function downloadPluginTiktok() {
            const code = `
/* Plugin ZyrClient - TikTok Scraper */
async function zyrtiktok(url) {
    let res = await fetch('https://www.tikwm.com/api/?url=' + encodeURIComponent(url));
    let json = await res.json();
    if(json.code === 0) {
        return { 
            video: json.data.play, like: json.data.digg_count, komen: json.data.comment_count,
            share: json.data.share_count, favorit: json.data.collect_count, views: json.data.play_count, caption: json.data.title
        };
    } else { return null; }
}`;
            const blob = new Blob([code], { type: "text/javascript" });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = "ZyrTiktokPlugin.js";
            a.click();
        }
    </script>
</body>
</html>
