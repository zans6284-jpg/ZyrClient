<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TikTok Downloader Engine - ZyrClient</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #070a12; --ui-blue: #1e293b; --ui-blue-dark: #0f172a; --accent-cyan: #00d2ff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-dark); color: #fff; padding: 40px 20px; min-height: 100vh; }
        
        .container { max-width: 600px; margin: 0 auto; background: linear-gradient(135deg, var(--ui-blue), var(--ui-blue-dark)); border-radius: 20px; padding: 30px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
        .back-btn { display: inline-block; color: var(--accent-cyan); text-decoration: none; font-weight: 600; margin-bottom: 20px; cursor: pointer; }
        
        h1.title-center { text-align: center; font-size: 2.2rem; margin-bottom: 5px; background: linear-gradient(to right, #fff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .brand-sub { text-align: center; color: var(--accent-cyan); font-size: 1.2rem; margin-bottom: 25px; display: flex; justify-content: center; align-items: center; gap: 10px; }
        
        .input-group { position: relative; margin-bottom: 20px; }
        .input-group input { width: 100%; padding: 15px 20px; background: #0b0f19; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: #fff; font-size: 1rem; outline: none; transition: border 0.3s; }
        .input-group input:focus { border-color: var(--accent-cyan); }
        
        .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; font-size: 1rem; font-weight: bold; cursor: pointer; transition: all 0.3s; display: flex; justify-content: center; align-items: center; gap: 10px; }
        .btn-take { background: var(--accent-cyan); color: #000; }
        .btn-take:hover { background: #00b4db; transform: scale(0.02); }
        
        /* Infotd Container Hidden by Default */
        .infotd { display: none; margin-top: 30px; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 15px; border: 1px dashed var(--accent-cyan); }
        .video-preview { width: 100%; max-height: 400px; border-radius: 10px; object-fit: contain; margin-bottom: 20px; background: #000; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-bottom: 20px; }
        .stat-item { background: #0b0f19; padding: 12px; border-radius: 8px; font-size: 0.95rem; display: flex; align-items: center; gap: 10px; color: #cbd5e1; }
        .stat-item i { color: var(--accent-cyan); width: 20px; }
        
        .caption-box { background: #0b0f19; padding: 15px; border-radius: 8px; font-size: 0.95rem; margin-bottom: 25px; border-left: 4px solid var(--accent-cyan); line-height: 1.5; }
        
        .download-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-dl { background: #22c55e; color: #fff; }
        .btn-audio { background: #a855f7; color: #fff; }
    </style>
</head>
<body>

    <div class="container">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-left"></i> Kembali ke Panel</a>
        <h1 class="title-center">ZyrClient</h1>
        <div class="brand-sub"><i class="fa-brands fa-tiktok"></i> TikTok Downloader Engine</div>

        <div class="input-group">
            <input type="text" id="targetUrl" placeholder="Tempel Tautan / URL Video TikTok di sini...">
        </div>

        <button class="btn btn-take" onclick="fetchTikTokData()"><i class="fa-solid fa-gears"></i> Take Video</button>

        <div class="infotd" id="infotdBox">
            <video class="video-preview" id="vPreview" controls></video>
            
            <div class="stats-grid">
                <div class="stat-item"><i class="fa-solid fa-user"></i> <span id="stUser">Username: -</span></div>
                <div class="stat-item"><i class="fa-solid fa-heart"></i> <span id="stLike">Like: 0</span></div>
                <div class="stat-item"><i class="fa-solid fa-comment"></i> <span id="stComment">Komentar: 0</span></div>
                <div class="stat-item"><i class="fa-solid fa-bookmark"></i> <span id="stFav">Favorit: 0</span></div>
                <div class="stat-item"><i class="fa-solid fa-eye"></i> <span id="stViews">Views: 0</span></div>
                <div class="stat-item"><i class="fa-solid fa-earth-americas"></i> <span id="stRegion">Region: -</span></div>
            </div>

            <div class="caption-box" id="vCaption"></div>

            <div class="download-actions">
                <button class="btn btn-dl" id="btnDlVideo"><i class="fa-solid fa-video"></i> Download</button>
                <button class="btn btn-audio" id="btnDlAudio"><i class="fa-solid fa-music"></i> Download Sound</button>
            </div>
        </div>
    </div>

    <script>
        async function fetchTikTokData() {
            const url = document.getElementById('targetUrl').value;
            if(!url) return alert('Silakan masukkan url link TikTok terlebih dahulu!');
            
            const btn = document.querySelector('.btn-take');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Memproses Engine...';
            
            try {
                // Menggunakan API Publik Gateway TikWM Terpercaya
                const res = await fetch(`https://www.tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const json = await res.json();
                
                if(json.code === 0 && json.data) {
                    const data = json.data;
                    document.getElementById('stUser').innerText = `Username: @${data.author.unique_id}`;
                    document.getElementById('stLike').innerText = `Like: ${data.digg_count.toLocaleString()}`;
                    document.getElementById('stComment').innerText = `Komentar: ${data.comment_count.toLocaleString()}`;
                    document.getElementById('stFav').innerText = `Favorit: ${data.collect_count.toLocaleString()}`;
                    document.getElementById('stViews').innerText = `Views: ${data.play_count.toLocaleString()}`;
                    document.getElementById('stRegion').innerText = `Region: ${data.region}`;
                    document.getElementById('vCaption').innerText = data.title || 'Tidak ada caption.';
                    
                    document.getElementById('vPreview').src = data.play;
                    
                    // Bind Event Handler Download
                    document.getElementById('btnDlVideo').onclick = () => window.open(data.play, '_blank');
                    document.getElementById('btnDlAudio').onclick = () => window.open(data.music, '_blank');
                    
                    document.getElementById('infotdBox').style.display = 'block';
                } else {
                    alert('Gagal mengambil data video. Pastikan link video valid!');
                }
            } catch (err) {
                alert('Terjadi kesalahan jaringan rute API!');
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-gears"></i> Take Video';
            }
        }
    </script>
</body>
</html>
