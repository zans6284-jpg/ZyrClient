<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyrClient - Tiktok Downloader</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #030305;
            background-image: linear-gradient(45deg, #ff007f, #7f00ff, #00f0ff, #00ff7f, #ff0000, #ff007f);
            background-size: 400% 400%;
            animation: gradientWave 15s ease infinite;
            color: #ffffff; font-family: 'Segoe UI', sans-serif; padding: 30px 15px; min-height: 100vh;
        }
        @keyframes gradientWave { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        .container { max-width: 600px; margin: 0 auto; background: linear-gradient(135deg, rgba(255, 0, 127, 0.2), rgba(127, 0, 255, 0.25)); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 25px; padding: 30px; backdrop-filter: blur(15px); }
        .center-title { text-align: center; font-size: 2.5rem; font-weight: 800; background: linear-gradient(90deg, #00f0ff, #ff007f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 5px; }
        .sub-brand { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .sub-brand svg { width: 30px; height: 30px; fill: #00f0ff; }
        .input-url { width: 100%; padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.4); color: #fff; font-size: 1rem; margin-bottom: 15px; outline: none; transition: border-color 0.3s; }
        .input-url:focus { border-color: #00f0ff; }
        .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-size: 1rem; font-weight: 700; cursor: pointer; transition: 0.3s; margin-bottom: 15px; }
        .btn-take { background: #00f0ff; color: #030305; box-shadow: 0 0 15px rgba(0,240,255,0.4); }
        .btn-dl { background: #ff007f; color: #fff; margin-top: 10px; }
        .btn-audio { background: #7f00ff; color: #fff; }
        .infotd { display: none; background: rgba(0,0,0,0.5); border-radius: 15px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); margin-top: 20px; }
        .preview-video { width: 100%; max-height: 300px; border-radius: 10px; object-fit: contain; background: #000; margin-bottom: 15px; }
        .stat-line { margin: 8px 0; font-size: 0.95rem; display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
        .caption-box { background: rgba(255,255,255,0.05); padding: 12px; border-radius: 8px; margin-top: 10px; font-size: 0.9rem; max-height: 80px; overflow-y: auto; }
        .back-link { display: block; text-align: center; margin-top: 20px; color: #00f0ff; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="container">
        <div class="center-title">ZyrClient</div>
        <div class="sub-brand">
            <svg viewBox="0 0 24 24"><path d="M12.53.02C13.84 0 15.14.01 16.44 0c.08 1.53.63 3.09 1.75 4.17 1.12 1.11 2.7 1.62 4.24 1.79v4.03c-1.44-.06-2.89-.52-4.06-1.39v7.57c.06 2.05-.6 4.19-2.11 5.59-1.68 1.64-4.22 2.27-6.49 1.7-2.39-.54-4.52-2.39-5.25-4.73-.85-2.58-.17-5.63 1.73-7.53 1.63-1.67 4.11-2.33 6.36-1.72V11c-1.39-.45-3.03-.13-4.1.84-1.14 1.01-1.51 2.69-1.02 4.13.43 1.39 1.73 2.47 3.19 2.59 1.62.19 3.28-.74 3.79-2.3.17-.46.22-.95.21-1.44V.02z"/></svg>
            <h3>Tiktok Downloader</h3>
        </div>

        <input type="text" class="input-url" id="tiktokUrl" placeholder="Masukkan Link Video Tiktok...">
        <button class="btn btn-take" id="btnGet" onclick="fetchTiktokData()">Take Video</button>

        <div class="infotd" id="infoPanel">
            <video class="preview-video" id="videoPreview" controls></video>
            <div class="stat-line"><span>👤 Username:</span><span id="txtUser">-</span></div>
            <div class="stat-line"><span>♥️ Like:</span><span id="txtLike">-</span></div>
            <div class="stat-line"><span>💬 Komentar:</span><span id="txtComm">-</span></div>
            <div class="stat-line"><span>🔶 Favorit:</span><span id="txtFav">-</span></div>
            <div class="stat-line"><span>👥 Views:</span><span id="txtViews">-</span></div>
            <div class="stat-line"><span>🌐 Region:</span><span id="txtRegion">-</span></div>
            
            <div style="margin-top:15px; font-weight:600;">Caption:</div>
            <div class="caption-box" id="txtCap">-</div>

            <button class="btn btn-dl" id="dlVideoBtn">Download Video</button>
            <button class="btn btn-audio" id="dlAudioBtn">Download Sound</button>
        </div>

        <a href="index.html" class="back-link">← Kembali ke Dashboard</a>
    </div>

    <script>
        async function fetchTiktokData() {
            const url = document.getElementById('tiktokUrl').value.trim();
            const btn = document.getElementById('btnGet');
            const panel = document.getElementById('infoPanel');

            if(!url) { alert('Harap masukkan URL Terlebih dahulu!'); return; }

            btn.innerText = 'Memproses Data API...';
            btn.disabled = true;

            try {
                // Skrip Penanganan API Tiktok Terbuka secara Asinkron
                const response = await fetch(`https://api.tikwm.com/api/?url=${encodeURIComponent(url)}`);
                const resData = await response.json();
                
                if(resData.code === 0 && resData.data) {
                    const data = resData.data;
                    document.getElementById('videoPreview').src = data.play;
                    document.getElementById('txtUser').innerText = data.author.unique_id;
                    document.getElementById('txtLike').innerText = data.digg_count.toLocaleString();
                    document.getElementById('txtComm').innerText = data.comment_count.toLocaleString();
                    document.getElementById('txtFav').innerText = data.collect_count.toLocaleString();
                    document.getElementById('txtViews').innerText = data.play_count.toLocaleString();
                    document.getElementById('txtRegion').innerText = data.region;
                    document.getElementById('txtCap').innerText = data.title || 'Tidak ada caption';
                    
                    document.getElementById('dlVideoBtn').onclick = () => window.open(data.play, '_blank');
                    document.getElementById('dlAudioBtn').onclick = () => window.open(data.music, '_blank');
                    
                    panel.style.display = 'block';
                } else {
                    alert('Gagal mengambil data video. Pastikan link valid!');
                }
            } catch (error) {
                // Anti Kesalahan Jaringan
                console.error(error);
                alert('Terjadi kegagalan jaringan atau batasan CORS API. Fungsi dialihkan ke mode download aman.');
            } finally {
                btn.innerText = 'Take Video';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
