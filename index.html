<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyrClient - Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: #000; color: #fff; min-height: 100vh; overflow-x: hidden; position: relative; padding: 40px 20px; }
        
        .bg-glow {
            position: fixed; width: 100%; height: 100%; top: 0; left: 0; z-index: -1;
            background: radial-gradient(circle at 50% 50%, rgba(255, 0, 127, 0.12), rgba(0, 242, 254, 0.12), transparent 60%);
            filter: blur(60px);
        }

        .header { text-align: center; margin-bottom: 50px; }
        .main-title {
            font-size: 3.5rem; font-weight: 700;
            background: linear-gradient(45deg, #ff007f, #00f2fe);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .subtitle { color: #a0aec0; font-size: 1rem; margin-top: 10px; font-weight: 400; }

        .menu-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px; max-width: 1100px; margin: 0 auto; width: 100%;
        }

        .panel-card {
            background: linear-gradient(135deg, rgba(255, 0, 127, 0.15), rgba(123, 44, 191, 0.3));
            border: 1px solid rgba(0, 242, 254, 0.25);
            border-radius: 18px; padding: 30px 20px; text-align: center;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            backdrop-filter: blur(10px); display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .panel-card:hover {
            transform: translateY(-5px);
            border-color: rgba(255, 0, 127, 0.6);
            box-shadow: 0 10px 25px rgba(255, 0, 127, 0.25), 0 0 15px rgba(0, 242, 254, 0.2);
        }
        
        .panel-card i { font-size: 3rem; margin-bottom: 15px; }
        .panel-card.tiktok i { color: #00f2fe; text-shadow: 0 0 15px rgba(0,242,254,0.4); }
        .panel-card.quality i { color: #00ff80; text-shadow: 0 0 15px rgba(0,255,128,0.4); }
        .panel-card.remini i { color: #ff007f; text-shadow: 0 0 15px rgba(255,0,127,0.4); }
        .panel-card.youtube i { color: #ff0000; text-shadow: 0 0 15px rgba(255,0,0,0.4); }

        .panel-card h3 { font-size: 1.25rem; font-weight: 600; color: #fff; letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="header">
        <h1 class="main-title">ZyrClient</h1>
        <p class="subtitle">Selamat datang di ZyrClient, api fungsi gratis untuk downloader.</p>
    </div>

    <div class="menu-grid">
        <div class="panel-card tiktok" onclick="location.href='TiktokD.html'">
            <i class="fab fa-tiktok"></i>
            <h3>Tiktok</h3>
        </div>
        <div class="panel-card quality" onclick="location.href='Upq.html'">
            <i class="fas fa-arrow-up-9-1"></i>
            <h3>Up Quality</h3>
        </div>
        <div class="panel-card remini" onclick="location.href='Reminihd.html'">
            <i class="fas fa-wand-magic-sparkles"></i>
            <h3>Hd Remini</h3>
        </div>
        <div class="panel-card youtube" onclick="location.href='Ytmp3.html'">
            <i class="fab fa-youtube"></i>
            <h3>YT MP3</h3>
        </div>
    </div>
</body>
</html>
