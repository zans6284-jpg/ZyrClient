<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyrClient</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e3a8a, #4c1d95, #2563eb);
            --panel-bg: rgba(30, 58, 138, 0.6);
            --border-color: rgba(59, 130, 246, 0.4);
            --magenta: #d946ef;
            --text-light: #f8fafc;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, sans-serif; }
        body {
            background: var(--bg-gradient); background-size: 400% 400%;
            animation: waveAnim 15s ease infinite; color: var(--text-light);
            min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px;
        }
        @keyframes waveAnim { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .container { width: 100%; max-width: 800px; text-align: center; }
        h1 { font-size: 3.5rem; background: linear-gradient(to right, #3b82f6, #d946ef); -webkit-background-clip: text; color: transparent; margin-bottom: 10px; }
        .subtitle { font-size: 1.1rem; color: #cbd5e1; margin-bottom: 40px; }
        
        .menu-grid { display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .panel {
            background: var(--panel-bg); border: 2px solid var(--border-color); border-radius: 20px;
            width: 100%; max-width: 500px; padding: 20px; display: flex; align-items: center; gap: 20px;
            cursor: pointer; text-decoration: none; color: white; transition: all 0.3s ease; backdrop-filter: blur(10px);
        }
        .panel:hover { transform: translateY(-5px); border-color: var(--magenta); box-shadow: 0 10px 20px rgba(217, 70, 239, 0.3); }
        .panel i { font-size: 2.5rem; width: 50px; text-align: center; }
        .panel span { font-size: 1.5rem; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ZyrClient</h1>
        <p class="subtitle">Selamat datang di ZyrClient, api fungsi gratis untuk downloader.</p>
        
        <div class="menu-grid">
            <a href="TiktokD.html" class="panel">
                <i class="fab fa-tiktok" style="color: #fff;"></i>
                <span>Tiktok Downloader</span>
            </a>
            <a href="Hd.html" class="panel">
                <i class="fas fa-image" style="color: #38bdf8;"></i>
                <span>HD Client</span>
            </a>
            <a href="Wabg.html" class="panel">
                <i class="fab fa-whatsapp" style="color: #25D366;"></i>
                <span>WhatsApp Ebg</span>
            </a>
        </div>
    </div>
</body>
</html>
