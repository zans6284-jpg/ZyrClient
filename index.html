<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyrClient - API Fungsi Gratis</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e1b4b, #4c1d95);
            --primary-blue: #2563eb;
            --light-blue: #3b82f6;
            --dark-blue: #1e3a8a;
            --magenta: #d946ef;
            --text-light: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientWave 15s ease infinite;
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animasi Gelombang Background */
        @keyframes gradientWave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Dekorasi Gelombang Tambahan */
        .wave {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 100px;
            background: url('https://i.imgur.com/vHRE75K.png'); /* Placeholder gelombang murni */
            background-size: 1000px 100px;
            opacity: 0.1;
            animation: waveAnim 10s linear infinite;
        }

        @keyframes waveAnim {
            0% { background-position-x: 0; }
            100% { background-position-x: 1000px; }
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
        }

        h1 {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(to right, #3b82f6, #d946ef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            filter: drop-shadow(0 2px 8px rgba(0,0,0,0.3));
        }

        .subtitle {
            font-size: 1.2rem;
            color: #94a3b8;
            margin-bottom: 50px;
        }

        /* Table Panel / Card Menu */
        .panel-menu {
            background: linear-gradient(135deg, var(--dark-blue), rgba(37, 99, 235, 0.4));
            width: 320px;
            padding: 25px;
            border-radius: 20px; /* Persegi panjang ujung bulat */
            border: 2px solid rgba(59, 130, 246, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            text-decoration: none;
            color: var(--text-light);
            margin: 0 auto;
        }

        .panel-menu:hover {
            transform: translateY(-5px);
            border-color: var(--magenta);
            box-shadow: 0 12px 20px rgba(217, 70, 239, 0.3);
            background: linear-gradient(135deg, var(--primary-blue), rgba(217, 70, 239, 0.3));
        }

        .panel-menu i {
            font-size: 2.5rem;
            color: #fff;
        }

        .panel-menu span {
            font-size: 1.5rem;
            font-weight: 600;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="wave"></div>

    <div class="container">
        <h1>ZyrClient</h1>
        <p class="subtitle">Selamat datang di ZyrClient, api fungsi gratis untuk downloader.</p>

        <a href="TiktokD.html" class="panel-menu">
            <i class="fab fa-tiktok"></i>
            <span>Tiktok Downloader</span>
        </a>
    </div>

</body>
</html>
