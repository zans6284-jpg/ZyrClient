<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyrClient - </title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* Tema warna: Biru tua, Biru, dan Magenta */
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e3a8a, #d946ef, #2563eb);
            --primary-blue: #3b82f6;
            --dark-blue: #1d4ed8; /* Biru tua tidak terlalu gelap */
            --magenta: #d946ef;
            --text-light: #f8fafc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientWave 12s ease infinite;
            color: var(--text-light);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animasi Gelombang Background */
        @keyframes gradientWave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Elemen Gelombang Visual Tambahan */
        .wave-bottom {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 150px;
            background: url('data:image/svg+xml;utf8,<svg viewBox="0 0 1440 320" xmlns="http://www.w3.org/2000/svg"><path fill="rgba(255,255,255,0.05)" d="M0,192L48,197.3C96,203,192,213,288,229.3C384,245,480,267,576,250.7C672,235,768,181,864,181.3C960,181,1056,235,1152,234.7C1248,235,1344,181,1392,154.7L1440,128L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') repeat-x;
            animation: waveMove 15s linear infinite;
        }

        @keyframes waveMove {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
            width: 100%;
            max-width: 700px; /* Lebar frame yang proporsional */
        }

        .title {
            font-size: 4.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(to right, #60a5fa, #d946ef);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.3));
        }

        .subtitle {
            font-size: 1.3rem;
            color: #cbd5e1;
            margin-bottom: 50px;
            line-height: 1.5;
        }

        /* Panel Menu TikTok */
        .panel-menu {
            background: rgba(29, 78, 216, 0.6); /* Biru tua transparan */
            backdrop-filter: blur(10px);
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 20px; /* Persegi panjang ujung bulat */
            border: 2px solid rgba(96, 165, 250, 0.4);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            text-decoration: none;
            color: var(--text-light);
            margin: 0 auto;
        }

        .panel-menu:hover {
            transform: translateY(-5px);
            border-color: var(--magenta);
            box-shadow: 0 12px 25px rgba(217, 70, 239, 0.4);
            background: rgba(37, 99, 235, 0.8);
        }

        .panel-menu i {
            font-size: 3rem;
        }

        .panel-menu span {
            font-size: 1.8rem;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="wave-bottom"></div>

    <div class="container">
        <h1 class="title">ZyrClient</h1>
        <p class="subtitle">Selamat datang di ZyrClient, api fungsi gratis untuk downloader.</p>

        <a href="TiktokD.html" class="panel-menu">
            <i class="fab fa-tiktok"></i>
            <span>TikTok</span>
        </a>
    </div>

</body>
</html>
