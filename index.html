<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyrClient - Hub API & Fungsi Media Gratis</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #070a12;
            --ui-blue: #1e293b;
            --ui-blue-dark: #0f172a;
            --accent-cyan: #00d2ff;
            --accent-magenta: #bd00ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            min-height: 100vh;
            overflow-y: auto;
            position: relative;
        }

        /* Animasi Gelombang Latar Belakang */
        .wave-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; overflow: hidden;
        }
        .wave {
            position: absolute; width: 200%; height: 200%;
            top: -50%; left: -50%;
            border-radius: 43%;
            background: linear-gradient(45deg, rgba(0,210,255,0.08) 0%, rgba(189,0,255,0.08) 100%);
            animation: drift 15s infinite linear;
        }
        .wave:nth-child(2) {
            animation: drift 25s infinite linear;
            background: linear-gradient(135deg, rgba(0,210,255,0.05) 0%, rgba(189,0,255,0.05) 100%);
        }

        @keyframes drift {
            from { transform: rotate(0deg); }
            from { transform: rotate(360deg); }
        }

        header {
            text-align: center;
            padding: 60px 20px 40px;
        }

        header h1 {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: 2px;
            background: linear-gradient(to right, var(--accent-cyan), var(--accent-magenta));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            filter: drop-shadow(0 0 15px rgba(0,210,255,0.3));
        }

        header p {
            color: #94a3b8;
            font-size: 1.1rem;
        }

        /* Grid Layout */
        .panel-container {
            max-width: 1000px;
            margin: 0 auto padding: 0 20px 60px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
        }

        .card {
            background: linear-gradient(135deg, var(--ui-blue), var(--ui-blue-dark));
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 18px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }

        .card::before {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-magenta));
            opacity: 0; transition: opacity 0.4s ease; z-index: 1;
        }

        .card:hover::before { opacity: 0.1; }

        .card:hover {
            transform: translateY(-8px);
            border-color: var(--accent-cyan);
            box-shadow: 0 15px 30px rgba(0,210,255,0.2);
        }

        .card-icon {
            font-size: 3rem;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #ffffff, #cbd5e1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            transition: transform 0.3s ease;
        }
        
        .card:hover .card-icon {
            transform: scale(1.1);
        }

        /* Memberikan warna khusus ikon saat hover */
        .card.tiktok:hover .card-icon { background: #00f2fe; -webkit-background-clip: text; }
        .card.uplevel:hover .card-icon { background: #38ef7d; -webkit-background-clip: text; }
        .card.remini:hover .card-icon { background: #ff4e50; -webkit-background-clip: text; }
        .card.youtube:hover .card-icon { background: #ff0000; -webkit-background-clip: text; }

        .card h3 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #f1f5f9;
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="wave-container">
        <div class="wave"></div>
        <div class="wave"></div>
    </div>

    <header>
        <h1>ZyrClient</h1>
        <p>Selamat datang di ZyrClient, API fungsi gratis untuk downloader & pengolah media.</p>
    </header>

    <main class="panel-container">
        <div class="card tiktok" onclick="location.href='TiktokD.html'">
            <div class="card-icon"><i class="fa-brands fa-tiktok"></i></div>
            <h3>Tiktok Downloader</h3>
        </div>

        <div class="card uplevel" onclick="location.href='Upq.html'">
            <div class="card-icon"><i class="fa-solid fa-cloud-arrow-up"></i></div>
            <h3>Up Quality 1K</h3>
        </div>

        <div class="card remini" onclick="location.href='Reminihd.html'">
            <div class="card-icon"><i class="fa-solid fa-wand-magic-sparkles"></i></div>
            <h3>HD Remini Pro</h3>
        </div>

        <div class="card youtube" onclick="location.href='Ytmp3.html'">
            <div class="card-icon"><i class="fa-brands fa-youtube"></i></div>
            <h3>YT MP3 Converter</h3>
        </div>
    </main>

</body>
</html>
