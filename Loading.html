<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyrClient - Loading</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background: #030305;
            background-image: linear-gradient(45deg, #ff007f, #7f00ff, #00f0ff, #00ff7f, #ff0000, #ff007f);
            background-size: 400% 400%;
            animation: gradientWave 12s ease infinite;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
        }
        @keyframes gradientWave {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .main-container {
            text-align: center;
            transition: transform 0.8s cubic-bezier(0.6, -0.28, 0.735, 0.045), opacity 0.6s ease;
        }
        .fall-animation {
            transform: translateY(100vh) scale(0.8);
            opacity: 0;
        }
        .title {
            font-size: 3.5rem;
            font-weight: 900;
            margin-bottom: 25px;
            background: linear-gradient(90deg, #00f0ff, #ff007f, #7f00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 240, 255, 0.2);
            letter-spacing: 2px;
        }
        .progress-box {
            width: 300px;
            background: rgba(255, 255, 255, 0.05);
            padding: 6px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            margin: 0 auto;
            position: relative;
        }
        .progress-bar {
            height: 16px;
            width: 0%;
            background: linear-gradient(90deg, #00f0ff, #ff007f);
            border-radius: 50px;
            box-shadow: 0 0 15px #ff007f;
            position: relative;
        }
        .percentage {
            margin-top: 15px;
            font-size: 1.2rem;
            font-weight: 600;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>

    <div class="main-container" id="loadingWrapper">
        <div class="title">ZyrClient</div>
        <div class="progress-box">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <div class="percentage" id="percentText">0%</div>
    </div>

    <script>
        const progressBar = document.getElementById('progressBar');
        const percentText = document.getElementById('percentText');
        const loadingWrapper = document.getElementById('loadingWrapper');
        
        let progress = 0;
        const duration = 10000; // Minimal 10 Detik Pemuatan
        const intervalTime = 100; 
        const step = (100 / (duration / intervalTime));

        const timer = setInterval(() => {
            progress += step;
            if (progress >= 100) {
                progress = 100;
                clearInterval(timer);
                
                progressBar.style.width = '100%';
                percentText.innerText = '100%';
                
                // Triger animasi jatuh sebelum pindah halaman
                setTimeout(() => {
                    loadingWrapper.classList.add('fall-animation');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 600);
                }, 500);
            } else {
                progressBar.style.width = progress + '%';
                percentText.innerText = Math.floor(progress) + '%';
            }
        }, intervalTime);
    </script>
</body>
</html>
