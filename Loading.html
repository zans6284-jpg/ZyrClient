<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyrClient - Loading</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body {
            background: #000;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }
        /* Animated Wave Gradient Background */
        .wave-bg {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0; z-index: 1;
            background: radial-gradient(circle at 10% 20%, rgba(0, 242, 254, 0.15), transparent 40%),
                        radial-gradient(circle at 90% 10%, rgba(255, 0, 127, 0.15), transparent 40%),
                        radial-gradient(circle at 50% 90%, rgba(0, 255, 128, 0.1), transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 0, 0, 0.1), transparent 40%);
            filter: blur(50px);
            animation: waveMotion 12s infinite alternate linear;
        }
        @keyframes waveMotion { 
            0% { transform: scale(1) rotate(0deg); } 
            100% { transform: scale(1.1) rotate(5deg); } 
        }

        .wrapper { z-index: 2; text-align: center; width: 90%; max-width: 400px; }
        
        .title-gradient {
            font-size: 3.5rem; font-weight: 800; margin-bottom: 25px;
            background: linear-gradient(45deg, #00f2fe, #ff007f, #00ff80, #ff0000);
            background-size: 300% 300%;
            animation: textFlow 4s infinite linear;
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        @keyframes textFlow { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .progress-container {
            width: 100%; background: rgba(255, 255, 255, 0.04);
            padding: 5px; border-radius: 30px; border: 1px solid rgba(0, 242, 254, 0.2);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.1);
        }
        .progress-bar {
            height: 22px; width: 0%;
            background: linear-gradient(90deg, #ff007f, #7b2cbf, #00f2fe);
            border-radius: 30px; display: flex; align-items: center; justify-content: flex-end;
            transition: width 0.1s linear;
        }
        .percent-text { color: #fff; font-size: 0.85rem; font-weight: 600; padding-right: 12px; }
        
        .drop-animation { animation: barFalling 1.2s cubic-bezier(0.6, -0.28, 0.735, 0.045) forwards; }
        @keyframes barFalling {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(120vh) rotate(12deg); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="wave-bg"></div>
    <div class="wrapper" id="loadingBox">
        <h1 class="title-gradient">ZyrClient</h1>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar">
                <span class="percent-text" id="percentText">0%</span>
            </div>
        </div>
    </div>

    <script>
        const pBar = document.getElementById('progressBar');
        const pText = document.getElementById('percentText');
        const lBox = document.getElementById('loadingBox');
        let count = 0;
        const totalDuration = 10000; // Minimal 10 detik pengisian
        const stepTime = totalDuration / 100;

        const progressInterval = setInterval(() => {
            count++;
            pBar.style.width = count + '%';
            pText.innerText = count + '%';

            if (count >= 100) {
                clearInterval(progressInterval);
                setTimeout(() => {
                    lBox.classList.add('drop-animation');
                    setTimeout(() => { window.location.href = 'index.html'; }, 1000);
                }, 400);
            }
        }, stepTime);
    </script>
</body>
</html>
