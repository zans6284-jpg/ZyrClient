<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZyrClient - HD Remini</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', sans-serif; }
        body { background: #000; color: #fff; min-height: 100vh; padding: 30px 15px; display: flex; flex-direction: column; align-items: center; }
        .title-top { font-size: 2.2rem; font-weight: 700; background: linear-gradient(45deg, #ff007f, #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .logo-sub { font-size: 2.5rem; color: #ff007f; margin-bottom: 25px; text-shadow: 0 0 15px rgba(255,0,127,0.4); }
        .app-box { width: 100%; max-width: 500px; background: linear-gradient(135deg, rgba(255, 0, 127, 0.1), rgba(123, 44, 191, 0.25)); border: 1px solid rgba(0, 242, 254, 0.2); border-radius: 20px; padding: 25px; backdrop-filter: blur(10px); }
        .file-zone { width: 100%; padding: 30px 20px; background: rgba(0,0,0,0.5); border: 2px dashed #ff007f; border-radius: 12px; text-align: center; cursor: pointer; margin-bottom: 20px; }
        .file-zone input { display: none; }
        .btn-action { width: 100%; padding: 14px; background: linear-gradient(90deg, #ff007f, #7b2cbf); border: none; border-radius: 30px; color: #fff; font-weight: 600; cursor: pointer; margin-bottom: 25px; }
        .output-box { display: none; width: 100%; text-align: center; background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; border: 1px solid #ff007f; }
        .output-img { width: 100%; max-height: 300px; object-fit: contain; border-radius: 8px; margin-bottom: 15px; filter: contrast(1.05) saturate(1.03) brightness(1.02); }
        .btn-dl { display: inline-block; width: 100%; padding: 12px; background: #ff007f; color: #fff; font-weight: 600; border-radius: 30px; text-decoration: none; }
    </style>
</head>
<body>
    <h1 class="title-top">ZyrClient</h1>
    <div class="logo-sub"><i class="fas fa-wand-magic-sparkles"></i></div>
    
    <div class="app-box">
        <div class="file-zone" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-images" style="font-size: 2.3rem; color: #ff007f; margin-bottom: 10px;"></i>
            <p id="uploadTxt">Masukkan File Foto atau Video</p>
            <input type="file" id="fileInput" accept="image/*" onchange="previewFile()">
        </div>
        <button class="btn-action" onclick="processRemini()">HD (4x Pass Enhancement)</button>

        <div class="output-box" id="outBox">
            <p style="font-size: 0.9rem; color: #00f2fe; margin-bottom: 10px;"><i class="fas fa-sparkles"></i> Hasil Penghdan Remini Selesai</p>
            <img class="output-img" id="outImg" src="">
            <a href="#" class="btn-dl" id="dlBtn" download="ZyrClient_ReminiHD.png">Download Hasil</a>
        </div>
    </div>

    <script>
        let fileData = null;
        function previewFile() {
            const file = document.getElementById('fileInput').files[0];
            if(file) {
                document.getElementById('uploadTxt').innerText = file.name;
                const reader = new FileReader();
                reader.onload = function(e) { fileData = e.target.result; }
                reader.readAsDataURL(file);
            }
        }
        function processRemini() {
            if(!fileData) return alert('Pilih file gambar terlebih dahulu!');
            const btn = document.querySelector('.btn-action');
            let pass = 1;
            
            const interval = setInterval(() => {
                btn.innerText = `Memproses Penjernihan Remini Pass ${pass}/4...`;
                pass++;
                if(pass > 4) {
                    clearInterval(interval);
                    renderHD();
                }
            }, 1000);

            function renderHD() {
                const img = new Image();
                img.src = fileData;
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = img.width * 2;
                    canvas.height = img.height * 2;
                    
                    ctx.filter = 'contrast(1.08) brightness(1.02) saturate(1.05)';
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    const result = canvas.toDataURL('image/png');
                    document.getElementById('outImg').src = result;
                    document.getElementById('dlBtn').href = result;
                    document.getElementById('outBox').style.display = 'block';
                    btn.innerText = 'HD (4x Pass Enhancement)';
                }
            }
        }
    </script>
</body>
</html>
